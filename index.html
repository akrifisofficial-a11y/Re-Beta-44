<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AniVolume — каталог озвучки</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="header">
        <div class="logo">⚡ AniVolume</div>
        <nav>
            <a href="index.html" class="active">Главная</a>
            <a href="#">Избранное</a>
        </nav>
    </header>

    <main class="container">
        <h1 class="page-title">🔥 Список аниме</h1>
        
        <!-- Поисковик -->
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск аниме..." />
                <button id="searchBtn">Найти</button>
                <button id="clearSearchBtn" class="clear-btn" style="display: none;">✕</button>
            </div>
            <div class="search-info" id="searchInfo"></div>
        </div>

        <div class="catalog" id="catalog">
            <!-- Карточки будут вставлены через JS -->
            <div style="text-align: center; padding: 50px; color: #55557a;">
                ⏳ Загрузка...
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 AniVolume — твой гид в мире аниме</p>
    </footer>

    <script src="script.js"></script>
</body>
                    </html>
